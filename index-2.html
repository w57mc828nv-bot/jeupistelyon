  {emoji:"🎭",mapsUrl:"https://www.google.com/maps/search/Op%C3%A9ra+de+Lyon",appleMapsUrl:"https://maps.apple.com/?q=Op%C3%A9ra%20de%20Lyon",data:{
    fr:{name:"Opéra de Lyon",subtitle:"Départ — Entre façade classique et sommet contemporain",walk:"Point de départ du parcours.",history:"Construit au XIXe siècle, l’Opéra de Lyon a été profondément transformé en 1993 par l’architecte Jean Nouvel. Il conserve une façade historique, mais son sommet a été entièrement repensé avec une structure contemporaine sombre et arrondie. Ce contraste entre ancien et moderne en fait l’un des bâtiments les plus reconnaissables de l’hypercentre lyonnais.",tip:"Le bar des Muses, situé au dernier étage, offre une vue imprenable sur Lyon. Vous pouvez y accéder par l’ascenseur à gauche de l’entrée de l’Opéra.",question:"Levez les yeux vers le sommet de l’Opéra. Une série de statues domine le bâtiment.\n\nCombien pouvez-vous en compter ?",answers:["8","huit"],hints:["Regardez la ligne de statues tout en haut de la façade.","Ces statues représentent un groupe célèbre lié aux arts. Il en manque une par rapport au nombre habituel."]},

    it:{name:"Opera di Lione",subtitle:"Partenza — Facciata classica e sommità contemporanea",walk:"Punto di partenza del percorso.",history:"Costruita nel XIX secolo, l’Opera di Lione è stata trasformata nel 1993 da Jean Nouvel. La facciata storica è stata conservata, mentre la parte superiore è stata ridisegnata con una struttura contemporanea scura e curva.",tip:"Il Bar des Muses, situato all’ultimo piano, offre una splendida vista su Lione.",question:"Alza lo sguardo verso la cima dell’Opera. Una serie di statue domina l’edificio.\n\nQuante riesci a contarne?",answers:["8","otto"],hints:["Guarda la fila di statue in cima alla facciata.","Ne manca una rispetto al numero abituale."]},
    de:{name:"Oper von Lyon",subtitle:"Start — Klassische Fassade und moderner Dachaufbau",walk:"Ausgangspunkt der Route.",history:"Die Oper von Lyon wurde im 19. Jahrhundert erbaut und 1993 vom Architekten Jean Nouvel grundlegend umgestaltet. Die historische Fassade blieb erhalten, während der obere Teil mit einer dunklen, abgerundeten zeitgenössischen Struktur neu gestaltet wurde.",tip:"Die Bar des Muses im obersten Stockwerk bietet einen großartigen Blick über Lyon. Sie erreichen sie über den Aufzug links vom Eingang der Oper.",question:"Schauen Sie nach oben zur Spitze der Oper. Eine Reihe von Statuen überragt das Gebäude.\n\nWie viele können Sie zählen?",answers:["8","acht"],hints:["Achten Sie auf die Reihe von Statuen ganz oben an der Fassade.","Eine fehlt im Vergleich zur üblichen Anzahl."]}
  }},

    fr:{name:"Place des Terreaux",subtitle:"Hôtel de Ville — Fontaine Bartholdi",walk:"3 minutes à pied depuis l’Opéra.",history:"La place des Terreaux est l’une des grandes places historiques de Lyon. Elle est bordée par l’Hôtel de Ville et le Musée des Beaux-Arts. Au centre, la fontaine Bartholdi attire immédiatement le regard. Elle a été conçue par Frédéric-Auguste Bartholdi, également connu pour la Statue de la Liberté.",tip:"Les jets d’eau sur la place sont… imprévisibles. Approchez-vous trop près, et vous pourriez repartir avec une douche gratuite.",question:"Combien de chevaux sont représentés sur la fontaine Bartholdi ?",answers:["4","quatre"],hints:["Observez l’ensemble de la sculpture, pas seulement les chevaux visibles de face.","Ils représentent quatre grands fleuves."]},
    en:{name:"Place des Terreaux",subtitle:"City Hall — Bartholdi Fountain",walk:"3-minute walk from the Opera House.",history:"Place des Terreaux is one of Lyon’s major historic squares. In the centre, the Bartholdi Fountain immediately catches the eye. The sculpture shows a female figure guiding powerful horses.",tip:"The water jets on the square can be unpredictable. Get too close, and you might leave with a free shower.",question:"How many horses are represented on the Bartholdi Fountain?",answers:["4","four"],hints:["Look at the whole sculpture, not only the horses visible from the front.","They represent four great rivers."]},
    es:{name:"Plaza de los Terreaux",subtitle:"Ayuntamiento — Fuente Bartholdi",walk:"3 minutos a pie desde la Ópera.",history:"La plaza de los Terreaux es una de las grandes plazas históricas de Lyon. En el centro, la fuente Bartholdi atrae inmediatamente la mirada.",tip:"Los chorros de agua de la plaza son imprevisibles. Si te acercas demasiado, podrías llevarte una ducha gratis.",question:"¿Cuántos caballos están representados en la fuente Bartholdi?",answers:["4","cuatro"],hints:["Observa toda la escultura, no solo los caballos visibles de frente.","Representan cuatro grandes ríos."]},

    fr:{name:"Passage de l’Argue",subtitle:"Passage couvert — 40 rue de la République",walk:"Environ 6 minutes à pied depuis la place des Terreaux. Rendez-vous devant l’entrée du Passage de l’Argue, au 40 rue de la République.",history:"Ouvert en 1828, le Passage de l’Argue est l’un des plus anciens passages couverts de Lyon. Inspiré des galeries parisiennes, il permettait de circuler à l’abri entre boutiques et ateliers élégants.",tip:"Ne traversez pas le passage trop vite : levez les yeux vers la verrière, observez les embranchements et imaginez son tracé vu du dessus.",question:"Quelle lettre de l’alphabet forme le passage ?",answers:["t"],hints:["Observez le passage comme si vous le regardiez sur un plan.","Cette lettre possède une longue barre verticale et une petite barre horizontale."]},
    en:{name:"Passage de l’Argue",subtitle:"Covered passage — 40 Rue de la République",walk:"About a 6-minute walk from Place des Terreaux. Go to the entrance of Passage de l’Argue at 40 Rue de la République.",history:"Opened in 1828, Passage de l’Argue is one of Lyon’s oldest covered passages. Inspired by Parisian galleries, it allowed people to walk sheltered between elegant shops and workshops.",tip:"Do not cross the passage too quickly: look up at the glass roof, observe the branches and imagine its layout from above.",question:"Which letter of the alphabet does the passage form?",answers:["t"],hints:["Look at the passage as if you were seeing it on a map.","This letter has a long vertical line and a short horizontal line."]},
    es:{name:"Passage de l’Argue",subtitle:"Pasaje cubierto — 40 Rue de la République",walk:"Unos 6 minutos a pie desde la plaza de los Terreaux. Ve a la entrada del Passage de l’Argue, en el 40 Rue de la République.",history:"Abierto en 1828, el Passage de l’Argue es uno de los pasajes cubiertos más antiguos de Lyon.",tip:"No atravieses el pasaje demasiado rápido: mira hacia la vidriera, observa las bifurcaciones e imagina su trazado visto desde arriba.",question:"¿Qué letra del alfabeto forma el pasaje?",answers:["t"],hints:["Observa el pasaje como si lo vieras en un plano.","Esta letra tiene una línea vertical larga y una línea horizontal corta."]},
    it:{name:"Passage de l’Argue",subtitle:"Passaggio coperto — 40 Rue de la République",walk:"Circa 6 minuti a piedi da Place des Terreaux. Vai all’ingresso del Passage de l’Argue, al 40 Rue de la République.",history:"Aperto nel 1828, il Passage de l’Argue è uno dei passaggi coperti più antichi di Lione.",tip:"Non attraversare il passaggio troppo in fretta: alza lo sguardo verso la vetrata, osserva le diramazioni e immagina il suo tracciato visto dall’alto.",question:"Quale lettera dell’alfabeto forma il passaggio?",answers:["t"],hints:["Osserva il passaggio come se lo guardassi su una mappa.","Questa lettera ha una lunga linea verticale e una piccola linea orizzontale."]},
    de:{name:"Passage de l’Argue",subtitle:"Überdachte Passage — 40 Rue de la République",walk:"Etwa 6 Minuten zu Fuß von der Place des Terreaux. Gehen Sie zum Eingang der Passage de l’Argue in der 40 Rue de la République.",history:"Die Passage de l’Argue wurde 1828 eröffnet und gehört zu den ältesten überdachten Passagen Lyons.",tip:"Durchqueren Sie die Passage nicht zu schnell: Schauen Sie zur Glasüberdachung hinauf, beobachten Sie die Abzweigungen und stellen Sie sich den Grundriss von oben vor.",question:"Welchen Buchstaben des Alphabets bildet die Passage?",answers:["t"],hints:["Betrachten Sie die Passage so, als würden Sie sie auf einem Stadtplan sehen.","Dieser Buchstabe hat eine lange senkrechte Linie und eine kurze waagerechte Linie."]}

  {emoji:"✨",mapsUrl:"https://www.google.com/maps/search/Place+des+Jacobins+Lyon",appleMapsUrl:"https://maps.apple.com/?q=Place%20des%20Jacobins%20Lyon",data:{
    fr:{name:"Place des Jacobins",subtitle:"Fontaine des Jacobins — Cœur de la Presqu’île",walk:"Environ 5 minutes à pied depuis le Passage de l’Argue. Rendez-vous devant la fontaine de la place des Jacobins.",history:"Ancien couvent devenu place royale, ce carrefour est le cœur de la Presqu’île. La fontaine, construite en 1885, rend hommage à quatre artistes lyonnais célèbres.",tip:"Fuyez les foules ! Pour un vrai café lyonnais, filez rue de l’Ancienne Préfecture, à 30 mètres.",question:"Quelle créature marine est représentée aux quatre coins de la fontaine ?",answers:["sirene","sirène"],hints:["Ce n’est pas un animal, mais une créature légendaire liée à la mer.","On la représente souvent avec un buste humain et une queue de poisson."]},
    en:{name:"Place des Jacobins",subtitle:"Jacobins Fountain — Heart of the Presqu’île",walk:"About a 5-minute walk from Passage de l’Argue. Go to the fountain on Place des Jacobins.",history:"Once a convent and later a royal square, this crossroads is at the heart of the Presqu’île. The fountain, built in 1885, pays tribute to four famous Lyon artists.",tip:"Escape the crowds! For a real Lyon-style coffee, head to Rue de l’Ancienne Préfecture, just 30 metres away.",question:"Which sea creature is represented at the four corners of the fountain?",answers:["mermaid","siren","sirene","sirène"],hints:["It is not an animal, but a legendary creature linked to the sea.","It is often represented with a human upper body and a fish tail."]},
    es:{name:"Place des Jacobins",subtitle:"Fuente de los Jacobinos — Corazón de la Presqu’île",walk:"A unos 5 minutos a pie desde el Passage de l’Argue. Ve a la fuente de la Place des Jacobins.",history:"Antiguo convento convertido en plaza real, este cruce está en el corazón de la Presqu’île.",tip:"¡Huye de las multitudes! Para tomar un verdadero café lionés, ve a la Rue de l’Ancienne Préfecture, a solo 30 metros.",question:"¿Qué criatura marina está representada en las cuatro esquinas de la fuente?",answers:["sirena"],hints:["No es un animal, sino una criatura legendaria vinculada al mar.","Suele representarse con torso humano y cola de pez."]},
    it:{name:"Place des Jacobins",subtitle:"Fontana dei Giacobini — Cuore della Presqu’île",walk:"Circa 5 minuti a piedi dal Passage de l’Argue. Vai alla fontana di Place des Jacobins.",history:"Antico convento diventato piazza reale, questo incrocio è nel cuore della Presqu’île.",tip:"Fuggi dalla folla! Per un vero caffè lionese, vai in Rue de l’Ancienne Préfecture, a soli 30 metri.",question:"Quale creatura marina è rappresentata ai quattro angoli della fontana?",answers:["sirena"],hints:["Non è un animale, ma una creatura leggendaria legata al mare.","Viene spesso rappresentata con busto umano e coda di pesce."]},
    de:{name:"Place des Jacobins",subtitle:"Jacobins-Brunnen — Herz der Presqu’île",walk:"Etwa 5 Minuten zu Fuß von der Passage de l’Argue. Gehen Sie zum Brunnen auf der Place des Jacobins.",history:"Einst ein Kloster und später ein königlicher Platz, liegt diese Kreuzung im Herzen der Presqu’île.",tip:"Entfliehen Sie dem Trubel! Für einen echten Lyoner Kaffee gehen Sie in die Rue de l’Ancienne Préfecture, nur 30 Meter entfernt.",question:"Welche Meereskreatur ist an den vier Ecken des Brunnens dargestellt?",answers:["sirene","meerjungfrau","nixe"],hints:["Es ist kein Tier, sondern ein sagenhaftes Wesen, das mit dem Meer verbunden ist.","Man stellt sie oft mit menschlichem Oberkörper und Fischschwanz dar."]}
  }},
  {emoji:"📜",mapsUrl:"https://www.google.com/maps/search/56+Rue+Merci%C3%A8re+Lyon",appleMapsUrl:"https://maps.apple.com/?q=56%20Rue%20Merci%C3%A8re%20Lyon",data:{
    fr:{name:"Le Passage des Secrets",subtitle:"Rue Mercière — Au numéro 56",walk:"Environ 6 minutes à pied depuis la place des Jacobins. Rendez-vous au 56 rue Mercière, sous l’arcade.",history:"Cette rue était le centre mondial de l’imprimerie à la Renaissance. Au numéro 56, sous l’arcade, se cache une impasse qui témoigne de l’urbanisme médiéval.",tip:"N’ayez pas peur de vous engager sous l’arcade ! Ce passage est un raccourci très pratique utilisé par les Lyonnais pour rejoindre les quais en quelques secondes.",question:"Observez la plaque présente au n°56 rue Mercière.\n\n21 - 4 - 5 - 2 - 8",answers:["canut"],hints:["1 = H","Le mot recherché désigne un ancien ouvrier lyonnais spécialisé dans la soie."]},
    en:{name:"The Passage of Secrets",subtitle:"Rue Mercière — Number 56",walk:"About a 6-minute walk from Place des Jacobins. Go to 56 Rue Mercière, under the arcade.",history:"This street was a world centre of printing during the Renaissance. At number 56, under the arcade, a hidden passage recalls medieval urban planning.",tip:"Don’t be afraid to step under the arcade! This passage is a very practical shortcut used by locals to reach the quays in just a few seconds.",question:"Look at the plaque at 56 Rue Mercière.\n\n21 - 4 - 5 - 2 - 8",answers:["canut"],hints:["1 = H","The hidden word refers to a former Lyon silk worker."]},
    es:{name:"El Pasaje de los Secretos",subtitle:"Rue Mercière — Número 56",walk:"A unos 6 minutos a pie desde la Place des Jacobins. Ve al número 56 de la Rue Mercière, bajo la arcada.",history:"Esta calle fue un centro mundial de la imprenta durante el Renacimiento. En el número 56, bajo la arcada, se esconde un pasaje.",tip:"¡No tengas miedo de pasar bajo la arcada! Este pasaje es un atajo muy práctico utilizado por los lioneses.",question:"Observa la placa situada en el número 56 de la Rue Mercière.\n\n21 - 4 - 5 - 2 - 8",answers:["canut"],hints:["1 = H","La palabra buscada designa a un antiguo obrero lionés especializado en la seda."]},
    it:{name:"Il Passaggio dei Segreti",subtitle:"Rue Mercière — Numero 56",walk:"Circa 6 minuti a piedi da Place des Jacobins. Vai al numero 56 di Rue Mercière, sotto l’arcata.",history:"Questa strada era un centro mondiale della stampa durante il Rinascimento. Al numero 56, sotto l’arcata, si nasconde un passaggio.",tip:"Non aver paura di entrare sotto l’arcata! Questo passaggio è una scorciatoia molto pratica usata dai lionesi.",question:"Osserva la targa presente al numero 56 di Rue Mercière.\n\n21 - 4 - 5 - 2 - 8",answers:["canut"],hints:["1 = H","La parola cercata indica un antico operaio lionese specializzato nella seta."]},
    de:{name:"Die Passage der Geheimnisse",subtitle:"Rue Mercière — Nummer 56",walk:"Etwa 6 Minuten zu Fuß von der Place des Jacobins. Gehen Sie zur Nummer 56 der Rue Mercière, unter den Arkaden.",history:"Diese Straße war während der Renaissance ein weltweit bedeutendes Zentrum des Buchdrucks. Bei Nummer 56 verbirgt sich ein Durchgang.",tip:"Zögern Sie nicht, unter die Arkaden zu gehen! Dieser Durchgang ist eine praktische Abkürzung.",question:"Betrachten Sie die Tafel bei Nr. 56 Rue Mercière.\n\n21 - 4 - 5 - 2 - 8",answers:["canut"],hints:["1 = H","Das gesuchte Wort bezeichnet einen ehemaligen Lyoner Seidenarbeiter."]}

  {emoji:"🌉",mapsUrl:"https://www.google.com/maps/search/Passerelle+du+Palais+de+Justice+Lyon",appleMapsUrl:"https://maps.apple.com/?q=Passerelle%20du%20Palais%20de%20Justice%20Lyon",data:{
    fr:{name:"Le Géant de Fer",subtitle:"Passerelle du Palais — Entre Presqu’île et Vieux Lyon",walk:"Environ 4 minutes à pied depuis la rue Mercière. Rejoignez la passerelle rouge du Palais de Justice, qui traverse la Saône vers le Vieux Lyon.",history:"Cette passerelle rouge vif est le trait d’union entre la Presqu’île et le Vieux Lyon. Elle utilise une technologie suspendue : des câbles en acier supportent tout le poids de la structure.",tip:"Prenez le temps de regarder vers le sud, à gauche quand vous allez vers le Vieux Lyon. Vous verrez le célèbre pont Bonaparte.",question:"Combien de pylônes servent à soutenir les câbles de la passerelle ?",answers:["1","un"],hints:["Regardez au centre du pont, là où le passage se sépare en deux.","Comptez l’élément rouge massif qui semble porter tous les fils d’acier."]},
    en:{name:"The Iron Giant",subtitle:"Palais Footbridge — Between Presqu’île and Old Lyon",walk:"About a 4-minute walk from Rue Mercière. Go to the red Palais de Justice footbridge crossing the Saône toward Old Lyon.",history:"This bright red footbridge links the Presqu’île with Old Lyon. Steel cables support the weight of the bridge.",tip:"Take a moment to look south, to your left as you head toward Old Lyon. You will see the famous Bonaparte Bridge.",question:"How many pylons support the bridge cables?",answers:["1","one","un"],hints:["Look at the centre of the bridge, where the walkway splits in two.","Count the massive red element that seems to carry all the steel cables."]},
    es:{name:"El Gigante de Hierro",subtitle:"Pasarela del Palacio — Entre Presqu’île y Viejo Lyon",walk:"A unos 4 minutos a pie desde la Rue Mercière. Ve a la pasarela roja del Palacio de Justicia.",history:"Esta pasarela roja intensa une la Presqu’île con el Viejo Lyon. Cables de acero soportan el peso del puente.",tip:"Tómate un momento para mirar hacia el sur, a la izquierda cuando vas hacia el Viejo Lyon.",question:"¿Cuántos pilones sostienen los cables de la pasarela?",answers:["1","uno","un"],hints:["Mira en el centro del puente, donde el paso se separa en dos.","Cuenta el gran elemento rojo que parece sostener todos los cables de acero."]},
    it:{name:"Il Gigante di Ferro",subtitle:"Passerella del Palazzo — Tra Presqu’île e Vieux Lyon",walk:"Circa 4 minuti a piedi da Rue Mercière. Raggiungi la passerella rossa del Palazzo di Giustizia.",history:"Questa passerella rosso vivo collega la Presqu’île al Vieux Lyon. Cavi d’acciaio sostengono il peso del ponte.",tip:"Prenditi un momento per guardare verso sud, a sinistra mentre vai verso il Vieux Lyon.",question:"Quanti piloni sostengono i cavi della passerella?",answers:["1","uno","un"],hints:["Guarda al centro del ponte, dove il passaggio si divide in due.","Conta il grande elemento rosso che sembra sostenere tutti i cavi d’acciaio."]},
    de:{name:"Der Eiserne Riese",subtitle:"Palais-Steg — Zwischen Presqu’île und Alt-Lyon",walk:"Etwa 4 Minuten zu Fuß von der Rue Mercière. Gehen Sie zur roten Fußgängerbrücke des Palais de Justice.",history:"Diese leuchtend rote Fußgängerbrücke verbindet die Presqu’île mit Alt-Lyon. Stahlseile tragen das Gewicht der Brücke.",tip:"Nehmen Sie sich einen Moment Zeit und blicken Sie nach Süden, links, wenn Sie in Richtung Alt-Lyon gehen.",question:"Wie viele Pylone tragen die Kabel der Fußgängerbrücke?",answers:["1","ein","eins"],hints:["Schauen Sie in die Mitte der Brücke, dort, wo sich der Weg teilt.","Zählen Sie das massive rote Element, das alle Stahlseile zu tragen scheint."]}
  }},
  {emoji:"⛪",mapsUrl:"https://www.google.com/maps/search/Cath%C3%A9drale+Saint-Jean-Baptiste+Lyon",appleMapsUrl:"https://maps.apple.com/?q=Cath%C3%A9drale%20Saint-Jean-Baptiste%20Lyon",data:{
    fr:{name:"Cathédrale Saint-Jean",subtitle:"La façade aux secrets — Vieux Lyon",walk:"Depuis la passerelle du Palais, traversez la Saône puis rejoignez la cathédrale Saint-Jean, au cœur du Vieux Lyon.",history:"Édifiée entre 1175 et 1480, cette cathédrale est un mélange unique de styles roman et gothique. Sa façade porte encore les stigmates des guerres de Religion.",tip:"Après l’observation de la façade, les petites rues autour de la cathédrale sont idéales pour une pause. Explorez les ruelles autour de la rue du Bœuf.",question:"Au centre de cette façade, une grande forme ronde domine l’ensemble comme un œil de pierre.\n\nComment appelle-t-on cet élément architectural ?",answers:["rosace","rose","fenetre ronde","fenêtre ronde"],hints:["C’est une grande fenêtre circulaire souvent présente sur les façades gothiques.","Nous en tracions au compas à l’école."]},
    en:{name:"Saint-Jean Cathedral",subtitle:"The Secret Façade — Old Lyon",walk:"From the Palais footbridge, cross the Saône and head to Saint-Jean Cathedral, in the heart of Old Lyon.",history:"Built between 1175 and 1480, this cathedral is a unique blend of Romanesque and Gothic styles. Its façade still bears the scars of the Wars of Religion.",tip:"After observing the façade, the small streets around the cathedral are ideal for a short break. Explore the lanes around Rue du Bœuf.",question:"At the centre of the façade, a large round shape dominates the whole like an eye of stone.\n\nWhat is this architectural element called?",answers:["rose window","rose","rosette","round window","circular window","rosace"],hints:["It is a large circular window often found on Gothic façades.","We used to draw them with a compass at school."]},
    es:{name:"Catedral de Saint-Jean",subtitle:"La fachada secreta — Viejo Lyon",walk:"Desde la pasarela del Palacio, cruza el Saona y dirígete a la catedral de Saint-Jean, en el corazón del Viejo Lyon.",history:"Construida entre 1175 y 1480, esta catedral es una mezcla única de estilos románico y gótico.",tip:"Después de observar la fachada, las pequeñas calles alrededor de la catedral son ideales para una pausa.",question:"En el centro de esta fachada, una gran forma redonda domina el conjunto como un ojo de piedra.\n\n¿Cómo se llama este elemento arquitectónico?",answers:["roseton","rosetón","rosa","ventana redonda","ventana circular","rosace"],hints:["Es una gran ventana circular que suele encontrarse en las fachadas góticas.","Los trazábamos con compás en la escuela."]},
    it:{name:"Cattedrale di Saint-Jean",subtitle:"La facciata segreta — Vieux Lyon",walk:"Dalla passerella del Palazzo, attraversa la Saona e raggiungi la cattedrale di Saint-Jean, nel cuore del Vieux Lyon.",history:"Costruita tra il 1175 e il 1480, questa cattedrale è un mix unico di stile romanico e gotico.",tip:"Dopo aver osservato la facciata, le piccole strade intorno alla cattedrale sono ideali per una pausa.",question:"Al centro della facciata, una grande forma rotonda domina l’insieme come un occhio di pietra.\n\nCome si chiama questo elemento architettonico?",answers:["rosone","rosa","finestra rotonda","finestra circolare","rosace"],hints:["È una grande finestra circolare spesso presente sulle facciate gotiche.","Li tracciavamo con il compasso a scuola."]},
    de:{name:"Kathedrale Saint-Jean",subtitle:"Die Fassade der Geheimnisse — Alt-Lyon",walk:"Überqueren Sie von der Palais-Brücke aus die Saône und gehen Sie zur Kathedrale Saint-Jean im Herzen von Alt-Lyon.",history:"Die Kathedrale wurde zwischen 1175 und 1480 erbaut und vereint romanische und gotische Stilelemente.",tip:"Nach der Betrachtung der Fassade eignen sich die kleinen Straßen rund um die Kathedrale ideal für eine Pause.",question:"In der Mitte dieser Fassade dominiert eine große runde Form das Ganze wie ein Auge aus Stein.\n\nWie nennt man dieses architektonische Element?",answers:["rose","rosenfenster","rundfenster","rosace"],hints:["Es ist ein großes rundes Fenster, das häufig an gotischen Fassaden zu finden ist.","In der Schule zeichneten wir solche Formen mit dem Zirkel."]}
  }},
  {emoji:"🚪",mapsUrl:"https://www.google.com/maps/search/54+Rue+Saint-Jean+Lyon",appleMapsUrl:"https://maps.apple.com/?q=54%20Rue%20Saint-Jean%20Lyon",data:{
    fr:{name:"La Longue Traboule",subtitle:"Passage secret — 54 rue Saint-Jean",walk:"Depuis la cathédrale Saint-Jean, remontez la rue Saint-Jean jusqu’au numéro 54. L’entrée de la traboule se trouve dans cette rue très animée du Vieux Lyon.",history:"Les traboules sont des passages typiques de Lyon qui permettent de traverser les immeubles pour passer d’une rue à l’autre. La Longue Traboule est l’une des plus emblématiques du quartier.",tip:"Entrez discrètement et parlez doucement : certaines traboules traversent encore des immeubles habités. Si une porte est fermée, ne forcez jamais.",question:"À l’entrée de la Longue Traboule, observez la plaque de présentation.\n\nElle indique le nombre de cours et d’immeubles traversés.\n\nAdditionnez ces deux nombres.\n\nEnfin, multipliez le résultat par l’écart entre le numéro de la porte d’entrée et celui de la porte de sortie.\n\nQuel résultat obtenez-vous ?",answers:["216","deux cent seize","deux-cent-seize"],hints:["Les deux adresses de la traboule sont le 54 rue Saint-Jean et le 27 rue du Bœuf.","La plaque indique 4 cours et 4 immeubles, et la différence entre les deux adresses est 27."]},
    en:{name:"The Long Traboule",subtitle:"Secret passage — 54 Rue Saint-Jean",walk:"From Saint-Jean Cathedral, walk up Rue Saint-Jean to number 54. The entrance to the traboule is on this lively street in Old Lyon.",history:"Traboules are typical Lyon passageways that allow people to cross through buildings from one street to another. The Long Traboule is one of the district’s most emblematic passages.",tip:"Enter quietly and speak softly: some traboules still pass through residential buildings. If a door is closed, never force it.",question:"At the entrance to the Long Traboule, look at the information plaque.\n\nIt indicates the number of courtyards and buildings crossed.\n\nAdd these two numbers together.\n\nThen multiply the result by the difference between the entrance door number and the exit door number.\n\nWhat result do you get?",answers:["216","two hundred sixteen","two hundred and sixteen"],hints:["The two addresses of the traboule are 54 Rue Saint-Jean and 27 Rue du Bœuf.","The plaque indicates 4 courtyards and 4 buildings, and the difference between the two addresses is 27."]},
    es:{name:"La Traboule Larga",subtitle:"Pasaje secreto — 54 Rue Saint-Jean",walk:"Desde la catedral de Saint-Jean, sube por la Rue Saint-Jean hasta el número 54.",history:"Las traboules son pasajes típicos de Lyon que permiten atravesar edificios para pasar de una calle a otra.",tip:"Entra con discreción y habla en voz baja. Si una puerta está cerrada, no la fuerces nunca.",question:"En la entrada de la Longue Traboule, observa la placa informativa.\n\nIndica el número de patios y edificios atravesados.\n\nSuma estos dos números.\n\nDespués multiplica el resultado por la diferencia entre el número de la puerta de entrada y el número de la puerta de salida.\n\n¿Qué resultado obtienes?",answers:["216","doscientos dieciseis","doscientos dieciséis"],hints:["Las dos direcciones de la traboule son 54 Rue Saint-Jean y 27 Rue du Bœuf.","La placa indica 4 patios y 4 edificios, y la diferencia entre las dos direcciones es 27."]},
    it:{name:"La Traboule Lunga",subtitle:"Passaggio segreto — 54 Rue Saint-Jean",walk:"Dalla cattedrale di Saint-Jean, risali Rue Saint-Jean fino al numero 54.",history:"Le traboules sono passaggi tipici di Lione che permettono di attraversare gli edifici per passare da una strada all’altra.",tip:"Entra con discrezione e parla piano. Se una porta è chiusa, non forzarla mai.",question:"All’ingresso della Longue Traboule, osserva la targa informativa.\n\nIndica il numero di cortili e di edifici attraversati.\n\nSomma questi due numeri.\n\nPoi moltiplica il risultato per la differenza tra il numero della porta d’ingresso e quello della porta d’uscita.\n\nQuale risultato ottieni?",answers:["216","duecentosedici","due cento sedici"],hints:["I due indirizzi della traboule sono 54 Rue Saint-Jean e 27 Rue du Bœuf.","La targa indica 4 cortili e 4 edifici, e la differenza tra i due indirizzi è 27."]},
    de:{name:"Die Lange Traboule",subtitle:"Geheimer Durchgang — 54 Rue Saint-Jean",walk:"Gehen Sie von der Kathedrale Saint-Jean die Rue Saint-Jean hinauf bis zur Nummer 54.",history:"Traboules sind typische Lyoner Durchgänge, die es ermöglichen, durch Gebäude von einer Straße zur anderen zu gelangen.",tip:"Treten Sie diskret ein und sprechen Sie leise. Wenn eine Tür geschlossen ist, erzwingen Sie nichts.",question:"Betrachten Sie am Eingang der Longue Traboule die Informationstafel.\n\nSie gibt die Anzahl der durchquerten Höfe und Gebäude an.\n\nAddieren Sie diese beiden Zahlen.\n\nMultiplizieren Sie das Ergebnis anschließend mit der Differenz zwischen der Hausnummer des Eingangs und der Hausnummer des Ausgangs.\n\nWelches Ergebnis erhalten Sie?",answers:["216","zweihundertsechzehn"],hints:["Die beiden Adressen der Traboule sind 54 Rue Saint-Jean und 27 Rue du Bœuf.","Die Tafel gibt 4 Höfe und 4 Gebäude an, und die Differenz zwischen den beiden Adressen beträgt 27."]}

function t(){return UI[lang];}
function currentStop(){return STOPS[index];}
function currentData(){return currentStop().data[lang]||currentStop().data.fr;}
function normalize(v){return v.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function saveGame(){localStorage.setItem(SAVE_KEY,JSON.stringify({lang,screen,index,score,shownHints,recap}));}
function loadGame(){const saved=localStorage.getItem(SAVE_KEY);if(!saved)return;const d=JSON.parse(saved);lang=d.lang||"fr";screen=d.screen||"location";index=d.index||0;score=d.score||0;shownHints=d.shownHints||[];recap=d.recap||[];render();}
function rank(){const max=STOPS.length*3;const ranks={fr:{gold:["Expert légendaire 🏅","Parcours parfait. Vous avez l’œil d’un vrai enquêteur.","OR"],silver:["Expert confirmé 🔍","Très belle performance. Vous avez observé les bons détails.","ARGENT"],bronze:["Explorateur curieux 🗺️","Vous avez terminé le parcours, mais Lyon garde encore quelques secrets.","BRONZE"],apprentice:["Apprenti enquêteur 🌱","Bravo, vous avez mené l’enquête jusqu’au bout.","APPRENTI"]},en:{gold:["Legendary Expert 🏅","Perfect route. You have the eye of a true investigator.","GOLD"],silver:["Confirmed Expert 🔍","Excellent performance. You spotted the right details.","SILVER"],bronze:["Curious Explorer 🗺️","You completed the route, but Lyon still keeps a few secrets.","BRONZE"],apprentice:["Apprentice Investigator 🌱","Well done, you followed the investigation to the end.","APPRENTICE"]},es:{gold:["Experto legendario 🏅","Recorrido perfecto. Tienes el ojo de un verdadero investigador.","ORO"],silver:["Experto confirmado 🔍","Muy buen resultado. Has observado los detalles correctos.","PLATA"],bronze:["Explorador curioso 🗺️","Has completado el recorrido, pero Lyon todavía guarda algunos secretos.","BRONCE"],apprentice:["Aprendiz investigador 🌱","Bravo, has llevado la investigación hasta el final.","APRENDIZ"]},it:{gold:["Esperto leggendario 🏅","Percorso perfetto. Hai l’occhio di un vero investigatore.","ORO"],silver:["Esperto confermato 🔍","Ottima performance. Hai osservato i dettagli giusti.","ARGENTO"],bronze:["Esploratore curioso 🗺️","Hai completato il percorso, ma Lione conserva ancora qualche segreto.","BRONZO"],apprentice:["Apprendista investigatore 🌱","Bravo, hai portato l’indagine fino alla fine.","APPRENDISTA"]},de:{gold:["Legendärer Experte 🏅","Perfekte Route. Sie haben den Blick eines echten Ermittlers.","GOLD"],silver:["Bestätigter Experte 🔍","Sehr starke Leistung. Sie haben die richtigen Details entdeckt.","SILBER"],bronze:["Neugieriger Entdecker 🗺️","Sie haben die Route abgeschlossen, aber Lyon bewahrt noch einige Geheimnisse.","BRONZE"],apprentice:["Ermittler-Lehrling 🌱","Bravo, Sie haben die Untersuchung bis zum Ende geführt.","LEHRLING"]}};const r=ranks[lang]||ranks.fr;if(score===max)return r.gold;if(score>=max-2)return r.silver;if(score>=Math.ceil(max/2))return r.bronze;return r.apprentice;}
function render(){const app=document.getElementById("app");const hasSave=!!localStorage.getItem(SAVE_KEY);if(screen!=="language"&&screen!=="unlock")saveGame();if(screen==="language"){app.innerHTML=`<section class="screen">${LANGUAGES.map(l=>`<button class="lang-btn" onclick="chooseLang('${l[0]}')"><span>${l[1]} ${l[2]}</span><span>›</span></button>`).join("")}${hasSave?`<button class="secondary" onclick="loadGame()">${t().resume}</button>`:""}</section>`;return;}if(screen==="unlock"){app.innerHTML=`<section class="screen"><div class="circle">🔐</div><div class="kicker">${t().brandCity}</div><h1 class="title">${t().title}</h1><p class="subtitle">${t().unlockSub}</p><input id="codeInput" placeholder="${t().unlockPlaceholder}" /><button onclick="validateCode()">${t().unlockButton}</button><p id="codeError" class="error"></p></section>`;return;}if(screen==="splash"){app.innerHTML=`<section class="screen"><div class="circle">🧭</div><div class="kicker">${t().brand}</div><h1 class="lyon">LYON</h1><p class="subtitle">${t().introLine}</p><p>${STOPS.map(s=>s.emoji).join("  ")}</p><button onclick="goLocation()">${t().start}</button><p class="small">${t().maxScore} : ${STOPS.length*3} pts</p></section>`;return;}if(screen==="location"){const s=currentStop(),d=currentData(),progress=((index+1)/STOPS.length)*100;app.innerHTML=`<div class="header"><div class="header-top"><span>${t().step} ${index+1} / ${STOPS.length}</span><strong>${t().score} : ${score}</strong></div><div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div></div><div class="hero">${s.emoji}<div class="badge">${index+1}</div></div><div class="content"><div class="place-title">${d.name}</div><div class="place-sub">${d.subtitle}</div><div class="box-title">📍 ${t().goThere}</div><div class="map-row"><a href="${s.mapsUrl}" target="_blank">Google Maps</a><a href="${s.appleMapsUrl}" target="_blank">Apple Maps</a></div><div class="box"><div class="box-title">🗺️ ${t().route}</div><div class="box-text">${d.walk}</div></div><div class="box"><div class="box-title">🏛️ ${t().history}</div><div class="box-text">${d.history}</div></div><div class="box"><div class="box-title">💡 ${t().localTip}</div><div class="box-text">${d.tip}</div></div><button onclick="goRiddle()">${t().solve} →</button></div>`;return;}if(screen==="riddle"){const d=currentData();app.innerHTML=`<div class="header"><div class="header-top"><span>${t().step} ${index+1} / ${STOPS.length}</span><strong>${t().score} : ${score}</strong></div></div><div class="content"><div class="box-title">🔎 ${t().riddle} ${index+1}</div><div class="riddle-card">${d.question}</div><input id="answerInput" placeholder="..." /><button onclick="checkAnswer()">${t().validate}</button><div id="hints">${shownHints.map(i=>`<div class="box hint"><div class="box-text">💡 ${d.hints[i]}</div></div>`).join("")}</div>${shownHints.length<2?`<button class="secondary" onclick="showHint()">${shownHints.length===0?t().revealHint:t().secondHint} ${t().hintCost}</button>`:""}<button class="secondary" onclick="goLocation()">← ${t().back}</button><button class="secondary" onclick="skipStep()">${t().skip}</button></div>`;return;}if(screen==="final"){const [rTitle,rDesc,badge]=rank();app.innerHTML=`<section class="screen"><div class="circle">🏆</div><div class="kicker">${t().finished}</div><h1 class="lyon">LYON</h1><div class="score-circle"><strong>${score}</strong><span>/ ${STOPS.length*3}</span></div><div class="box"><div class="box-title">${badge}</div><div class="box-text"><strong>${rTitle}</strong><br>${rDesc}</div></div><div class="box"><div class="box-text">${t().finalNote}</div></div></section>`;}}
function chooseLang(l){lang=l;screen="unlock";render();}
function validateCode(){const value=document.getElementById("codeInput").value.trim().toUpperCase();if(VALID_CODES.includes(value)){screen="splash";render();}else{document.getElementById("codeError").innerText=t().unlockError;}}
function goLocation(){screen="location";render();}
function goRiddle(){screen="riddle";render();}
function showHint(){if(shownHints.length<2){shownHints.push(shownHints.length);render();}}
function checkAnswer(){const value=normalize(document.getElementById("answerInput").value);const d=currentData();const ok=d.answers.some(a=>normalize(a)===value);if(ok){const pts=Math.max(3-shownHints.length,1);showOverlay(true,pts);}else{alert("❌");}}
function skipStep(){showOverlay(false,0);}
function showOverlay(correct,pts){const d=currentData();const div=document.createElement("div");div.className="overlay";div.innerHTML=`<div class="modal"><div style="font-size:58px">${correct?"🎉":"⏭️"}</div><h1>${correct?t().correct:t().skipped}</h1><p class="subtitle">${t().answerWas} : <strong>${d.answers[0].toUpperCase()}</strong></p><div style="font-size:36px;color:#c9a84c">+${pts}</div><button onclick="nextStep(${pts})">${index+1>=STOPS.length?t().final:t().next}</button></div>`;document.body.appendChild(div);}
function nextStep(pts){score+=pts;recap.push({emoji:currentStop().emoji,name:currentData().name,pts});shownHints=[];const overlay=document.querySelector(".overlay");if(overlay)overlay.remove();if(index+1>=STOPS.length){screen="final";}else{index++;screen="location";}render();}
render();
  </script>
